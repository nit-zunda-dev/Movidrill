<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movidrill - Interactive IT Learning Platform</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
<style>
  :root {
    --bg-primary: #0a0e17;
    --bg-secondary: #111827;
    --bg-tertiary: #1a2235;
    --bg-card: #151d2e;
    --bg-hover: #1e2a40;
    --accent-cyan: #22d3ee;
    --accent-cyan-dim: rgba(34, 211, 238, 0.15);
    --accent-green: #34d399;
    --accent-green-dim: rgba(52, 211, 153, 0.12);
    --accent-amber: #fbbf24;
    --accent-amber-dim: rgba(251, 191, 36, 0.12);
    --accent-rose: #fb7185;
    --accent-rose-dim: rgba(251, 113, 133, 0.12);
    --accent-purple: #a78bfa;
    --accent-purple-dim: rgba(167, 139, 250, 0.12);
    --accent-blue: #60a5fa;
    --accent-blue-dim: rgba(96, 165, 250, 0.12);
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-dim: #64748b;
    --border: #1e293b;
    --border-active: #334155;
    --success: #34d399;
    --error: #fb7185;
    --warning: #fbbf24;
    --radius: 8px;
    --radius-lg: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --font-mono: 'JetBrains Mono', monospace;
    --font-sans: 'Noto Sans JP', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: var(--font-sans);
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
  }

  /* ===== LAYOUT ===== */
  .app-container {
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 56px 1fr;
    height: 100vh;
  }

  /* ===== TOP BAR ===== */
  .topbar {
    grid-column: 1 / -1;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 10;
  }
  .topbar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.5px;
  }
  .topbar-logo .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    color: var(--bg-primary);
    font-weight: 800;
  }
  .topbar-logo span:last-child { color: var(--accent-cyan); }
  .topbar-right {
    display: flex; align-items: center; gap: 16px;
  }
  .topbar-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--accent-cyan-dim);
    color: var(--accent-cyan);
    border: 1px solid rgba(34, 211, 238, 0.25);
  }
  .topbar-user {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--bg-tertiary);
    border: 2px solid var(--border-active);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--text-secondary);
    cursor: pointer;
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 12px;
  }
  .sidebar-section-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    padding: 12px 12px 8px;
  }
  .sidebar-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 2px;
    position: relative;
  }
  .sidebar-item:hover { background: var(--bg-hover); }
  .sidebar-item.active {
    background: var(--accent-cyan-dim);
    border: 1px solid rgba(34, 211, 238, 0.2);
  }
  .sidebar-item.active .sidebar-item-name { color: var(--accent-cyan); }
  .sidebar-item.disabled { opacity: 0.4; cursor: default; }
  .sidebar-item.disabled:hover { background: transparent; }
  .sidebar-item-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .sidebar-item-text { flex: 1; min-width: 0; }
  .sidebar-item-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sidebar-item-desc {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 1px;
  }
  .sidebar-item .coming-soon {
    font-family: var(--font-mono);
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--bg-tertiary);
    color: var(--text-dim);
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  /* ===== MAIN CONTENT ===== */
  .main-content {
    overflow-y: auto;
    background: var(--bg-primary);
  }

  /* ===== DASHBOARD ===== */
  .dashboard {
    padding: 32px;
    max-width: 1200px;
    margin: 0 auto;
    animation: fadeIn 0.4s ease;
  }
  .dashboard h1 {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .dashboard h1 span { color: var(--accent-cyan); }
  .dashboard-sub {
    color: var(--text-secondary);
    font-size: 14px;
    margin-bottom: 32px;
  }
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    transition: all 0.25s;
  }
  .stat-card:hover {
    border-color: var(--border-active);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }
  .stat-label { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
  .stat-value {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 700;
  }
  .stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
  .module-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .module-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .module-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-accent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .module-card:hover {
    border-color: var(--border-active);
    transform: translateY(-3px);
    box-shadow: var(--shadow);
  }
  .module-card:hover::before { opacity: 1; }
  .module-card.disabled {
    opacity: 0.5;
    cursor: default;
  }
  .module-card.disabled:hover {
    transform: none;
    box-shadow: none;
  }
  .module-card-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    margin-bottom: 16px;
  }
  .module-card-title {
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .module-card-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: 16px;
  }
  .module-card-footer {
    display: flex; justify-content: space-between; align-items: center;
  }
  .module-card-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
  }

  /* ===== LESSON VIEW ===== */
  .lesson-view {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr;
    height: calc(100vh - 56px);
    animation: fadeIn 0.4s ease;
  }
  .lesson-header {
    grid-column: 1 / -1;
    padding: 16px 24px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .lesson-header-left {
    display: flex; align-items: center; gap: 16px;
  }
  .btn-back {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 6px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    font-family: var(--font-sans);
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-back:hover { background: var(--bg-hover); color: var(--text-primary); }
  .lesson-title-area h2 {
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 600;
  }
  .lesson-title-area p {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .step-indicator {
    display: flex; align-items: center; gap: 8px;
  }
  .step-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--bg-tertiary);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    transition: all 0.3s;
  }
  .step-dot.completed {
    background: var(--accent-green-dim);
    border-color: var(--accent-green);
    color: var(--accent-green);
  }
  .step-dot.active {
    background: var(--accent-cyan-dim);
    border-color: var(--accent-cyan);
    color: var(--accent-cyan);
    box-shadow: 0 0 12px rgba(34, 211, 238, 0.3);
  }
  .step-line {
    width: 20px; height: 2px;
    background: var(--border);
    border-radius: 1px;
  }
  .step-line.completed { background: var(--accent-green); }

  /* Video Panel */
  .video-panel {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .video-container {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    position: relative;
    flex-shrink: 0;
  }
  .video-container iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  .video-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f1724, #1a1f3a);
    color: var(--text-dim);
    gap: 12px;
  }
  .video-placeholder-icon { font-size: 48px; opacity: 0.5; }
  .video-placeholder-text { font-size: 13px; }

  .info-panel {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }
  .info-section {
    margin-bottom: 20px;
  }
  .info-section-title {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .info-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ER Diagram */
  .er-diagram {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    overflow-x: auto;
  }
  .er-table {
    display: inline-block;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    min-width: 160px;
    margin: 8px;
    vertical-align: top;
  }
  .er-table-header {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    padding: 8px 12px;
    background: var(--accent-cyan-dim);
    color: var(--accent-cyan);
    border-bottom: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .er-table-row {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 12px;
    color: var(--text-secondary);
    display: flex;
    justify-content: space-between;
    gap: 12px;
    border-bottom: 1px solid rgba(30,41,59,0.5);
  }
  .er-table-row:last-child { border-bottom: none; }
  .er-col-name { color: var(--text-primary); }
  .er-col-type { color: var(--text-dim); font-size: 10px; }
  .er-pk { color: var(--accent-amber); }

  /* Task Card */
  .task-card {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .task-card h4 {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--text-primary);
  }
  .task-card p {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .task-hint {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent-amber);
    background: var(--accent-amber-dim);
    padding: 8px 12px;
    border-radius: var(--radius);
    margin-top: 10px;
    border-left: 3px solid var(--accent-amber);
  }

  /* Editor Panel */
  .editor-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .editor-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
  }
  .editor-toolbar-left {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
  }
  .editor-toolbar-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent-green);
  }
  .editor-area {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .sql-editor {
    flex: 1;
    min-height: 160px;
    background: var(--bg-primary);
    border: none;
    color: var(--accent-cyan);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.7;
    padding: 20px;
    resize: none;
    outline: none;
    tab-size: 2;
  }
  .sql-editor::placeholder { color: var(--text-dim); }
  .editor-actions {
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
  }
  .btn {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    padding: 8px 20px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .btn-primary {
    background: var(--accent-cyan);
    color: var(--bg-primary);
  }
  .btn-primary:hover {
    background: #06b6d4;
    box-shadow: 0 0 20px rgba(34, 211, 238, 0.3);
  }
  .btn-secondary {
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }
  .btn-success {
    background: var(--accent-green);
    color: var(--bg-primary);
  }
  .btn-success:hover { box-shadow: 0 0 20px rgba(52, 211, 153, 0.3); }

  /* Results Panel */
  .results-panel {
    flex: 1;
    overflow: auto;
    background: var(--bg-primary);
    border-top: 1px solid var(--border);
  }
  .results-header {
    padding: 10px 16px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .results-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--font-mono);
    font-size: 12px;
  }
  .results-table th {
    background: var(--bg-tertiary);
    color: var(--accent-cyan);
    font-weight: 600;
    padding: 8px 14px;
    text-align: left;
    position: sticky;
    top: 0;
    border-bottom: 1px solid var(--border);
  }
  .results-table td {
    padding: 7px 14px;
    color: var(--text-secondary);
    border-bottom: 1px solid rgba(30,41,59,0.3);
  }
  .results-table tr:hover td { background: var(--bg-hover); }

  /* Feedback */
  .feedback {
    padding: 12px 16px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid var(--border);
  }
  .feedback.success {
    background: var(--accent-green-dim);
    color: var(--accent-green);
    border-top-color: rgba(52, 211, 153, 0.3);
  }
  .feedback.error {
    background: var(--accent-rose-dim);
    color: var(--accent-rose);
    border-top-color: rgba(251, 113, 133, 0.3);
  }
  .feedback.info {
    background: var(--accent-blue-dim);
    color: var(--accent-blue);
  }

  /* Expected Results */
  .expected-panel {
    margin-top: 12px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .expected-header {
    padding: 8px 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent-amber);
    background: var(--accent-amber-dim);
    border-bottom: 1px solid var(--border);
  }

  /* APISync */
  .api-spec-card {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
  }
  .api-spec-row {
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 6px 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .api-spec-label {
    color: var(--text-dim);
    min-width: 100px;
  }
  .api-spec-row code {
    color: var(--accent-amber);
    background: var(--bg-primary);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .api-request-form {
    padding: 12px 16px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
  }
  .api-request-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .api-request-row:last-child { margin-bottom: 0; }
  .api-request-form select {
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 8px 12px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    min-width: 100px;
  }
  .api-path-input {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 8px 12px;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
  }
  .api-body-row { flex-direction: column; align-items: stretch; }
  .api-body-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .api-body-input {
    min-height: 60px;
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 10px;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-secondary);
    resize: vertical;
  }
  .api-response-status {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    padding: 10px 16px;
    background: var(--bg-tertiary);
    border-bottom: 1px solid var(--border);
    color: var(--accent-cyan);
  }
  .api-response-body {
    margin: 0;
    padding: 16px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-secondary);
    white-space: pre-wrap;
    word-break: break-all;
  }
  .api-yaml-editor { min-height: 120px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }

const STORAGE_KEY = 'movidrill-completed-steps';

const state = {
  currentView: 'dashboard', // 'dashboard' | 'querysync-lessons' | 'apisync-lessons' | 'lesson'
  currentModule: null,
  currentLesson: null,
  currentStep: 0,
  completedSteps: (() => {
    try {
      const s = localStorage.getItem(STORAGE_KEY);
      return s ? JSON.parse(s) : [];
    } catch (_) { return []; }
  })(),
  db: null,
  queryResults: null,
  queryColumns: null,
  feedback: null,
  showHint: false,
  apiResponse: null,
  lastRequest: null,
  apiYaml: ''
};

function persistCompletedSteps() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.completedSteps));
  } catch (_) {}
}

// ============================================================
// Database Engine (sql.js)
// ============================================================
async function initDatabase(lesson) {
  const SQL = await initSqlJs({
    locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`
  });
  state.db = new SQL.Database();

  // Create tables and insert data
  for (const [tableName, table] of Object.entries(lesson.tables)) {
    const colDefs = table.columns.map(c => `${c.name} ${c.type}`).join(', ');
    state.db.run(`CREATE TABLE ${tableName} (${colDefs})`);

    const placeholders = table.columns.map(() => '?').join(', ');
    const stmt = state.db.prepare(`INSERT INTO ${tableName} VALUES (${placeholders})`);
    for (const row of table.data) {
      stmt.bind(row);
      stmt.step();
      stmt.reset();
    }
    stmt.free();
  }
}

function executeQuery(sql) {
  try {
    const results = state.db.exec(sql);
    if (results.length === 0) return { columns: [], values: [], error: null };
    return { columns: results[0].columns, values: results[0].values, error: null };
  } catch (e) {
    return { columns: [], values: [], error: e.message };
  }
}

    </div>`;

    const yamlEl = document.getElementById('api-yaml-editor');
    if (yamlEl) yamlEl.value = state.apiYaml || lesson.openApiYaml || '';
    const methodEl = document.getElementById('api-method');
    if (methodEl) {
      ['GET', 'POST', 'PUT', 'DELETE'].forEach(m => { methodEl.innerHTML += `<option value="${m}">${m}</option>`; });
      const preferred = state.lastRequest ? state.lastRequest.method : (step.expectedRequest && step.expectedRequest.method) || 'GET';
      methodEl.value = preferred;
    }
    const pathEl = document.getElementById('api-path');
    if (pathEl) pathEl.value = state.lastRequest ? state.lastRequest.path : (step.expectedRequest && step.expectedRequest.path) || '';
    const bodyEl = document.getElementById('api-body');
    if (bodyEl) bodyEl.value = state.lastRequest && state.lastRequest.body ? state.lastRequest.body : '';
    return;
  }

  // --- QuerySync: 以下従来のレッスン画面 ---
  // Step indicator
  let stepIndicator = '';
  lesson.steps.forEach((s, i) => {
    const isCompleted = state.completedSteps.includes(`${lesson.id}-${s.id}`);
    const isCurrent = i === state.currentStep;
    const cls = isCompleted ? 'completed' : (isCurrent ? 'active' : '');
    
    if (i > 0) {
      stepIndicator += `<div class="step-line ${isCompleted || isCurrent ? 'completed' : ''}"></div>`;
    }
    stepIndicator += `<div class="step-dot ${cls}">${isCompleted ? '✓' : s.id}</div>`;
  });

  // ER Diagram
  let erHtml = '';
  for (const [, table] of Object.entries(lesson.tables)) {
    erHtml += `<div class="er-table">
      <div class="er-table-header">📋 ${table.name}</div>`;
    table.columns.forEach(col => {
      erHtml += `<div class="er-table-row">
        <span class="er-col-name">${col.pk ? '<span class="er-pk">🔑</span> ' : ''}${col.name}</span>
        <span class="er-col-type">${col.type}</span>
      </div>`;
    });
    erHtml += '</div>';
  }

  // Results table
  let resultsHtml = '';
  if (state.queryResults) {
    if (state.queryResults.error) {
      resultsHtml = `
        <div class="feedback error">
          ❌ <span>${state.queryResults.error}</span>
        </div>`;
    } else if (state.queryResults.values.length > 0) {
      let tableHtml = '<table class="results-table"><thead><tr>';
      state.queryResults.columns.forEach(c => { tableHtml += `<th>${c}</th>`; });
      tableHtml += '</tr></thead><tbody>';
      state.queryResults.values.forEach(row => {
        tableHtml += '<tr>';
        row.forEach(val => { tableHtml += `<td>${val !== null ? val : 'NULL'}</td>`; });
        tableHtml += '</tr>';
      });
      tableHtml += '</tbody></table>';
      resultsHtml = tableHtml;
    } else {
      resultsHtml = '<div style="padding:20px;color:var(--text-dim);text-align:center;font-size:13px;">結果なし（0行）</div>';
    }
  }

  // Feedback
  let feedbackHtml = '';
  if (state.feedback) {
    feedbackHtml = `<div class="feedback ${state.feedback.type}">
      ${state.feedback.type === 'success' ? '✅' : state.feedback.type === 'error' ? '❌' : 'ℹ️'}
      <span>${state.feedback.message}</span>
      ${state.feedback.type === 'success' && state.currentStep < lesson.steps.length - 1
        ? `<button class="btn btn-success" onclick="nextStep()" style="margin-left:auto;">次のステップへ →</button>`
        : ''}
      ${state.feedback.type === 'success' && state.currentStep === lesson.steps.length - 1
        ? `<span style="margin-left:auto;font-weight:600;">🎉 レッスン完了！</span><button class="btn btn-secondary" onclick="navigateToQuerySyncLessons()" style="margin-left:8px;">レッスン一覧に戻る</button>`
        : ''}
    </div>`;
  }

  main.innerHTML = `
    <div class="lesson-view">
      <div class="lesson-header">
        <div class="lesson-header-left">
          <button class="btn-back" onclick="navigateToQuerySyncLessons()">← QuerySyncに戻る</button>
          <div class="lesson-title-area">
            <h2>${mod.icon} ${lesson.title}</h2>
            <p>Step ${state.currentStep + 1} / ${lesson.steps.length} — ${step.title}</p>
          </div>
        </div>
        <div class="step-indicator">
          ${stepIndicator}
        </div>
      </div>

      <!-- Left: Video + Info -->
      <div class="video-panel">
        <div class="video-container">
          ${lesson.videoId
            ? `<iframe src="https://www.youtube.com/embed/${lesson.videoId}?start=${step.videoTimestamp}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`
            : `<div class="video-placeholder">
                <div class="video-placeholder-icon">▶️</div>
                <div class="video-placeholder-text">動画IDを設定するとここにYouTubeが表示されます</div>
              </div>`
          }
        </div>
        <div class="info-panel">
          <div class="info-section">
            <div class="info-section-title">課題</div>
            <div class="task-card">
              <h4>📝 ${step.title}</h4>
              <p>${step.instruction}</p>
              ${state.showHint ? `<div class="task-hint">💡 ヒント: ${step.hint}</div>` : 
                `<div style="margin-top:10px">
                  <button class="btn btn-secondary" onclick="toggleHint()" style="font-size:11px;padding:5px 12px;">
                    💡 ヒントを表示
                  </button>
                </div>`
              }
            </div>
          </div>
          <div class="info-section">
            <div class="info-section-title">テーブル構造（ER図）</div>
            <div class="er-diagram">
              ${erHtml}
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Editor + Results -->
      <div class="editor-panel">
        <div class="editor-toolbar">
          <div class="editor-toolbar-left">
            <div class="editor-toolbar-dot"></div>
            SQL Editor
          </div>
          <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim)">
            sql.js (ブラウザ内実行)
          </span>
        </div>
        <div class="editor-area">
          <textarea class="sql-editor" id="sql-editor"
            placeholder="ここにSQLクエリを入力してください...&#10;&#10;例: SELECT * FROM employees"
            spellcheck="false"
          ></textarea>
        </div>
        <div class="editor-actions">
          <button class="btn btn-primary" onclick="runQuery()">▶ 実行 (Ctrl+Enter)</button>
          <button class="btn btn-secondary" onclick="clearEditor()">クリア</button>
          <button class="btn btn-secondary" onclick="checkAnswer()">✔ 回答を判定</button>
        </div>
        <div class="results-panel">
          <div class="results-header">
            <span>📋 実行結果</span>
            <span>${state.queryResults && !state.queryResults.error ? state.queryResults.values.length + ' rows' : ''}</span>
          </div>
          ${resultsHtml || '<div style="padding:40px;text-align:center;color:var(--text-dim);font-size:13px;">クエリを実行すると結果がここに表示されます</div>'}
          <div class="expected-panel">
            <div class="expected-header">期待する結果</div>
            <div style="padding:12px;font-size:13px;color:var(--text-secondary);">
              ${step.expectedSummary || ''}
            </div>
            <div style="padding:0 12px 12px;">
              <code style="font-family:var(--font-mono);font-size:11px;color:var(--accent-cyan);background:var(--bg-primary);padding:6px 10px;border-radius:4px;display:block;overflow-x:auto;">${step.expectedQuery || ''}</code>
            </div>
          </div>
        </div>
        ${feedbackHtml}
      </div>
    </div>
  `;

  // Keyboard shortcut
  const editor = document.getElementById('sql-editor');
  editor.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      runQuery();
    }
    // Tab key support
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
      editor.selectionStart = editor.selectionEnd = start + 2;
    }
  });
}

// ============================================================
// Actions
// ============================================================

function navigateToDashboard() {
  state.currentView = 'dashboard';
  state.currentModule = null;
  state.currentLesson = null;
  state.queryResults = null;
  state.feedback = null;
  state.showHint = false;
  renderSidebar();
  renderDashboard();
}

function navigateToQuerySyncLessons() {
  state.currentView = 'querysync-lessons';
  state.currentModule = 'querysync';
  state.currentLesson = null;
  state.queryResults = null;
  state.feedback = null;
  renderSidebar();
  renderQuerySyncLessons();
}

async function navigateToModule(moduleId) {
  if (moduleId === 'querysync') {
    state.currentView = 'querysync-lessons';
    state.currentModule = moduleId;
    state.currentLesson = null;
    state.queryResults = null;
    state.feedback = null;
    renderSidebar();
    renderQuerySyncLessons();
    return;
  }
  if (moduleId === 'apisync') {
    state.currentView = 'apisync-lessons';
    state.currentModule = moduleId;
    state.currentLesson = null;
    state.apiResponse = null;
    state.lastRequest = null;
    state.feedback = null;
    renderSidebar();
    renderAPISyncLessons();
  }
}

function navigateToAPISyncLessons() {
  state.currentView = 'apisync-lessons';
  state.currentModule = 'apisync';
  state.currentLesson = null;
  state.apiResponse = null;
  state.lastRequest = null;
  state.feedback = null;
  renderSidebar();
  renderAPISyncLessons();
}

async function startLesson(lessonId) {
  const apisyncLesson = APISYNC_LESSONS.find(l => l.id === lessonId);
  if (apisyncLesson) {
    state.currentView = 'lesson';
    state.currentModule = 'apisync';
    state.currentLesson = apisyncLesson;
    state.currentStep = 0;
    state.apiResponse = null;
    state.lastRequest = null;
    state.apiYaml = apisyncLesson.openApiYaml || '';
    state.feedback = null;
    state.showHint = false;
    renderSidebar();
    renderLesson();
    return;
  }
  const lesson = QUERYSYNC_LESSONS.find(l => l.id === lessonId);
  if (!lesson) return;
  state.currentView = 'lesson';
  state.currentModule = 'querysync';
  state.currentLesson = lesson;
  state.currentStep = 0;
  state.queryResults = null;
  state.feedback = null;
  state.showHint = false;
  await initDatabase(lesson);
  renderSidebar();
  renderLesson();
}

function runQuery() {
  const editor = document.getElementById('sql-editor');
  const sql = editor.value.trim();
  if (!sql) return;
  
  const result = executeQuery(sql);
  state.queryResults = result;
  state.feedback = null;
  renderLesson();

  // Restore query in editor
  document.getElementById('sql-editor').value = sql;
}

function checkAnswer() {
  const editor = document.getElementById('sql-editor');
  const sql = editor.value.trim();
  if (!sql) {
    state.feedback = { type: 'info', message: 'クエリを入力してから判定してください。' };
    renderLesson();
    return;
  }

  // Execute first
  const result = executeQuery(sql);
  state.queryResults = result;

  if (result.error) {
    state.feedback = { type: 'error', message: `SQLエラーが発生しました: ${result.error}` };
    renderLesson();
    document.getElementById('sql-editor').value = sql;
    return;
  }

  const step = state.currentLesson.steps[state.currentStep];
  const isCorrect = step.validate(result.values, result.columns, sql);

  if (isCorrect) {
    state.completedSteps.push(`${state.currentLesson.id}-${step.id}`);
    persistCompletedSteps();
    state.feedback = { type: 'success', message: `正解です！「${step.title}」をクリアしました。` };
  } else {
    state.feedback = { type: 'error', message: '結果が期待値と一致しません。クエリを見直してみてください。' };
  }

  renderLesson();
  document.getElementById('sql-editor').value = sql;
}

function nextStep() {
  if (state.currentStep < state.currentLesson.steps.length - 1) {
    if (state.currentModule === 'apisync') {
      const yamlEl = document.getElementById('api-yaml-editor');
      if (yamlEl) state.apiYaml = yamlEl.value;
      state.apiResponse = null;
      state.lastRequest = null;
    }
    state.currentStep++;
    state.queryResults = null;
    state.feedback = null;
    state.showHint = false;
    renderLesson();
  }
}

function saveAPISyncEditorState() {
  const yamlEl = document.getElementById('api-yaml-editor');
  if (yamlEl) state.apiYaml = yamlEl.value;
}

function sendAPISyncRequest() {
  saveAPISyncEditorState();
  const method = (document.getElementById('api-method') || {}).value || 'GET';
  const path = (document.getElementById('api-path') || {}).value.trim() || '';
  let bodyStr = (document.getElementById('api-body') || {}).value.trim() || '';
  state.lastRequest = { method, path, body: bodyStr };

  const step = state.currentLesson.steps[state.currentStep];
  const expected = step.expectedRequest || {};
  let match = method === (expected.method || 'GET') && path === (expected.path || '');
  if (match && expected.bodySchema && bodyStr) {
    try {
      const parsed = JSON.parse(bodyStr);
      match = expected.bodySchema.every(key => key in parsed);
    } catch (_) { match = false; }
  }
  if (match) {
    state.apiResponse = { status: step.mockResponse.status, body: step.mockResponse.body };
  } else {
    state.apiResponse = { status: 400, body: { error: 'Bad Request', message: 'リクエストが期待と一致しません。メソッド・パス・Bodyを確認してください。' } };
  }
  state.feedback = null;
  renderLesson();
}

function checkAPISyncAnswer() {
  saveAPISyncEditorState();
  if (!state.apiResponse) {
    state.feedback = { type: 'info', message: '先に「送信」してレスポンスを取得してください。' };
    renderLesson();
    return;
  }
  const step = state.currentLesson.steps[state.currentStep];
  const isCorrect = step.validate(state.apiResponse, state.lastRequest);
  if (isCorrect) {
    state.completedSteps.push(`${state.currentLesson.id}-${step.id}`);
    persistCompletedSteps();
    state.feedback = { type: 'success', message: `正解です！「${step.title}」をクリアしました。` };
  } else {
    state.feedback = { type: 'error', message: 'レスポンスが期待値と一致しません。リクエストを見直してください。' };
  }
  renderLesson();
}

function clearEditor() {
  state.queryResults = null;
  state.feedback = null;
  renderLesson();
}

function toggleHint() {
  if (state.currentModule === 'apisync') saveAPISyncEditorState();
  state.showHint = !state.showHint;
  const sql = document.getElementById('sql-editor')?.value || '';
  renderLesson();
  if (sql) document.getElementById('sql-editor').value = sql;
}

// ============================================================
// Boot
// ============================================================
renderSidebar();
renderDashboard();
</script>

</body>
</html>
